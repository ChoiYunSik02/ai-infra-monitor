services:
  mysql:
    image: mysql:8.0
    container_name: aim-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aim-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: aim-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: infra_logs
      TZ: Asia/Seoul
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - aim-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: aim-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      TZ: Asia/Seoul
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - aim-network
    depends_on:
      mysql:
        condition: service_healthy

  node-red:
    build:
      context: ./node-red
      dockerfile: Dockerfile
    container_name: aim-node-red
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
    ports:
      - "1880:1880"
    volumes:
      - ./node-red/data:/data
      - ./node-red/collect_metrics.sh:/usr/local/bin/collect_metrics.sh
    networks:
      - aim-network
    depends_on:
      mysql:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    container_name: aim-n8n
    restart: unless-stopped
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD}
      WEBHOOK_URL: http://localhost:5678
      N8N_SECURE_COOKIE: "false"
      N8N_USER_MANAGEMENT_DISABLED: "true"
      TZ: Asia/Seoul
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - aim-network

  django:
    build:
      context: ./django
      dockerfile: Dockerfile
    container_name: aim-django
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      TZ: Asia/Seoul
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: infra_logs
      OLLAMA_HOST: ${OLLAMA_HOST}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    ports:
      - "8000:8000"
    volumes:
      - ./django:/app
    networks:
      - aim-network
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: aim-php
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "8080:8080"
    networks:
      - aim-network
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  mongodb_data:
  grafana_data:
  n8n_data:

networks:
  aim-network:
    driver: bridge
